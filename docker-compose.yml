version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: agent-postgres
    environment:
      POSTGRES_DB: agent_db
      POSTGRES_USER: agent_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_user -d agent_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - agent-network

  # 后端服务
  backend:
    build:
      context: ./ft-agent-backend
      dockerfile: Dockerfile
    container_name: agent-backend
    environment:
      # API 配置
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.deepseek.com}
      HF_ENDPOINT: https://hf-mirror.com

      # 数据库配置
      DB_TYPE: postgresql
      DB_USER: agent_user
      DB_PASSWORD: ${DB_PASSWORD:-change_me_in_production}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agent_db
    volumes:
      - backend_uploads:/app/uploads
      - backend_qdrant:/app/local_qdrant
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - agent-network

  # 前端服务
  frontend:
    build:
      context: ./ft-agent-frontend
      dockerfile: Dockerfile
    container_name: agent-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - agent-network

  # 管理后台
  admin:
    build:
      context: ./ft-agent-admin
      dockerfile: Dockerfile
    container_name: agent-admin
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
  backend_qdrant:
    driver: local
