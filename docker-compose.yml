version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: agent-postgres
    environment:
      POSTGRES_DB: agent_db
      POSTGRES_USER: ft_agent
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ft_agent123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ft_agent -d agent_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - agent-network

  # 后端服务
  backend:
    build:
      context: ./ft-agent-backend
      dockerfile: Dockerfile
    container_name: agent-backend
    environment:
      # API 配置
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.deepseek.com}
      HF_ENDPOINT: https://hf-mirror.com

      # 数据库配置
      DB_TYPE: postgresql
      DB_USER: ft_agent
      DB_PASSWORD: ${DB_PASSWORD:-ft_agent123}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agent_db

      # 支付配置
      ALIPAY_APP_ID: ${ALIPAY_APP_ID:-}
      ALIPAY_SANDBOX: ${ALIPAY_SANDBOX:-true}
      ALIPAY_PRIVATE_KEY: ${ALIPAY_PRIVATE_KEY:-}
      ALIPAY_PUBLIC_KEY: ${ALIPAY_PUBLIC_KEY:-}
      WECHAT_APP_ID: ${WECHAT_APP_ID:-}
      WECHAT_MCH_ID: ${WECHAT_MCH_ID:-}
      WECHAT_API_KEY: ${WECHAT_API_KEY:-}
      PAYMENT_CALLBACK_URL: ${PAYMENT_CALLBACK_URL}

      # Redis（可选）
      REDIS_URL: ${REDIS_URL:-}

      # Webhook（可选）
      WEBHOOK_ENABLED: ${WEBHOOK_ENABLED:-false}
      WEBHOOK_URL: ${WEBHOOK_URL:-}

    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - agent-network

  # 前端服务（用户端）
  frontend:
    build:
      context: ./ft-agent-frontend
      dockerfile: Dockerfile
    container_name: agent-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - agent-network

  # 管理后台
  admin:
    build:
      context: ./ft-agent-admin
      dockerfile: Dockerfile
    container_name: agent-admin
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - agent-network

networks:
  agent-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
